name: token-heatmap
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  # Core ML stack — installs CUDA-enabled PyTorch when the pytorch+nvidia channels are used.
  # For CPU-only: replace with `pytorch::pytorch>=2.1 cpuonly`
  - pytorch::pytorch>=2.1
  - pytorch::torchvision>=0.16
  - conda-forge:pandas>=2.0
  - conda-forge:numpy>=1.24
  - conda-forge:matplotlib>=3.8
  - conda-forge:pyyaml>=5.1
  - conda-forge:pip
  - pip:
    # transformers/accelerate lag slightly behind conda-forge, so install via pip
    - transformers>=5.0
    - accelerate>=0.30
    # Qwen2 tokenizer extras
    - tiktoken>=0.6
    - einops>=0.7
    # Dev / test
    - pytest>=7.0
    - pytest-cov>=4.0
    - jsonschema>=4.20
    # Install the library in editable mode
    - "-e ."
