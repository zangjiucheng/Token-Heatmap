# Pre-commit hooks for the llm_token_heatmap Python package.
# Install with: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
