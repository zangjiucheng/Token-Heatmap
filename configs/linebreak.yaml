# Manifold reproduction experiment — a counting / fixed-width line task in the
# spirit of "When Models Manipulate Manifolds" (transformer-circuits.pub/2025/
# linebreaks). The model must track "how many items on this line so far" and
# reset at each newline — a periodic counting scalar whose activation cloud we
# then inspect for a helical manifold.
model: Qwen/Qwen2.5-7B-Instruct
prompt: "List the numbers from 1 to 80. Put exactly 10 numbers on each line, separated by single spaces, and start a new line after every 10th number. Output only the numbers."

max_new_tokens: 160
temperature: 0.2
top_p: 0.95
min_k: 8
max_k: 64
mass_threshold: 0.95

out: outputs/linebreak

capture_logit_lens: true
lens_layers: all
lens_top_k: 8
