name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU PyTorch
        # The CPU wheels are far smaller than the default CUDA build and are all
        # the test suite needs (conftest.py builds tiny models — no downloads).
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + dev extras
        run: python -m pip install -e ".[dev,models]"

      - name: Lint (ruff, advisory)
        # Pre-existing lint debt lives outside this gate for now; surfaced but
        # non-blocking. Flip to a hard gate once the package is ruff-clean.
        continue-on-error: true
        run: ruff check llm_token_heatmap tests

      - name: Run tests
        run: pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  app:
    name: Desktop app (compile check)
    # Verifies the Tauri desktop app still compiles on every commit (frontend +
    # Rust shell). Host OS only (Linux) — the full mac/win/linux installers are
    # built and attached to Releases by app-release.yml, not here.
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/frontend/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      # No releaseId / GITHUB_TOKEN -> tauri-action only builds (no upload),
      # which is exactly the per-commit compile check we want.
      - name: Build the desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: web/frontend
