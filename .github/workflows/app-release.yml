name: Release app

# Build the downloadable Token Heatmap desktop app (Tauri) for macOS, Windows,
# and Linux and attach the installers to the GitHub Release. Runs alongside
# release.yml (PyPI) so one published Release ships both the `token-heatmap`
# tracer (PyPI) and the viewer app (binaries).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # upload built bundles as Release assets

concurrency:
  group: app-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.platform }} ${{ matrix.args }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15 # Apple Silicon (pinned: avoid the macos-latest -> macOS 26 auto-migration)
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-15 # Intel (cross-compiled from the Apple-Silicon runner)
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04 # older glibc -> AppImage runs on more distros
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/frontend/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: npm ci

      # Builds the app (runs `npm run build` via beforeBuildCommand, then cargo)
      # and, on a published Release, uploads the installers to that Release.
      # On a manual workflow_dispatch there's no releaseId, so it just builds.
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: web/frontend
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
