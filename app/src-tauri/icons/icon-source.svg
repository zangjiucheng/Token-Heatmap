<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Token Heatmap">
  <!--
    Master app icon for the Token Heatmap desktop app. Same brand as
    public/favicon.svg: a dark rounded tile holding a 3x3 viridis heatmap
    (dark purple = low probability, yellow = high), increasing along the
    diagonal. Rendered to PNG and fed to `tauri icon` to regenerate the
    whole platform icon set. ~11% transparent margin + large corner radius
    so it reads as a native rounded app icon on macOS/Windows.
  -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23272e"/>
      <stop offset="1" stop-color="#15181d"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded tile -->
  <rect x="112" y="112" width="800" height="800" rx="180" fill="url(#tile)"/>
  <rect x="112.5" y="112.5" width="799" height="799" rx="179.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- 3x3 viridis heatmap (cell 176, gap 40, grid centered in the tile) -->
  <g>
    <rect x="208" y="208" width="176" height="176" rx="34" fill="#440154"/>
    <rect x="424" y="208" width="176" height="176" rx="34" fill="#3b528b"/>
    <rect x="640" y="208" width="176" height="176" rx="34" fill="#21918c"/>
    <rect x="208" y="424" width="176" height="176" rx="34" fill="#3b528b"/>
    <rect x="424" y="424" width="176" height="176" rx="34" fill="#21918c"/>
    <rect x="640" y="424" width="176" height="176" rx="34" fill="#5ec962"/>
    <rect x="208" y="640" width="176" height="176" rx="34" fill="#21918c"/>
    <rect x="424" y="640" width="176" height="176" rx="34" fill="#5ec962"/>
    <rect x="640" y="640" width="176" height="176" rx="34" fill="#fde725"/>
  </g>
</svg>
