site_name: LLM Token Heatmap
site_description: Documentation for the LLM Token Heatmap Python library, CLI, and web app.
repo_url: https://github.com/zangjiucheng/Token-Heatmap
docs_dir: docs
site_dir: site
use_directory_urls: false
theme:
  name: mkdocs
nav:
  - Home: README.md
  - Installation: installation.md
  - CLI: cli.md
  - Python API: python-api.md
  - Web App: web-app.md
  - Trace Schema: schema.md
  - Interpreting Outputs: interpreting.md
  - Troubleshooting: troubleshooting.md
  - Interpretability Epics:
      - Overview: epics/README.md
      - 01 · Direct Logit Attribution: epics/01-direct-logit-attribution.md
      - 02 · Interventions / Ablation: epics/02-interventions-ablation.md
      - 03 · Attribution Graph: epics/03-attribution-graph.md
      - 04 · Faithfulness & Error: epics/04-faithfulness-error-reporting.md
      - 05 · Cross-layer Logit Flow: epics/05-cross-layer-logit-flow.md
      - 06 · SAE / Transcoder Features: epics/06-sae-transcoder-features.md
      - 07 · Global TWERA: epics/07-twera-global-coactivation.md
  - JSON Schemas:
      - Trace: web/trace.schema.json
      - Attention Sidecar: web/attention-sidecar.schema.json
      - Activation: web/activation.schema.json
      - Activation Sidecar: web/activation-sidecar.schema.json
      - Activation Diff: web/activation-diff.schema.json
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
